# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-stage semantic ranking pipeline for candidate discovery.
  
  Stage 1: Dense bi-encoder retrieval (all-MiniLM-L6-v2) via FAISS for
  initial semantic matching against the job description.
  
  Stage 2: Hard disqualifier and honeypot trap detection using heuristic
  rules (blocked titles, agency-only experience, synthetic profiles,
  LangChain-only newcomers, pure-research academics).
  
  Stage 3: Cross-encoder reranking (ms-marco-MiniLM-L-6-v2) on top-250
  candidates for deep contextual attention scoring.
  
  Stage 4: Reciprocal Rank Fusion (RRF) combining dense and cross-encoder
  rankings into a unified fusion score.
  
  Stage 5: Heuristic blending with experience, availability, GitHub
  activity, and recruiter-save boosts. Evidence-based reasoning generated
  from raw candidate data for each ranked output.
  
  Runtime: ~2 minutes for 5K candidates on CPU.

